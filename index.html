<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Pedilo Ya!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
// ============================================================
//  CONFIG — barrios, enemigos, upgrades
// ============================================================
const GAME_W = 390;
const GAME_H = 844;

const BARRIOS = [
  {
    key: 'palermo', nombre: 'Palermo',
    bgColor: 0xf5e6d3, roadColor: 0xd4b896,
    buildingColors: [0xe8c4a0, 0xc9b99a, 0xf0d4b8, 0xb8a888],
    accentColor: 0x7cb99a, dificultad: 1, velocidadScroll: 180,
    descripcion: 'Hipster saturado'
  },
  {
    key: 'flores', nombre: 'Flores',
    bgColor: 0x1a0533, roadColor: 0x2d1055,
    buildingColors: [0xff6b35, 0xf7c59f, 0x2ec4b6, 0xe84855],
    accentColor: 0xffe66d, dificultad: 2, velocidadScroll: 220,
    descripcion: 'Caos urbano vibrante'
  },
  {
    key: 'laboca', nombre: 'La Boca',
    bgColor: 0x0d1b8e, roadColor: 0x1a2fa8,
    buildingColors: [0xf7d000, 0xe8001c, 0x2255c4, 0xffffff],
    accentColor: 0xf7d000, dificultad: 3, velocidadScroll: 260,
    descripcion: 'Conventillo + fútbol'
  },
  {
    key: 'conurbano', nombre: 'Conurbano',
    bgColor: 0x1c1c1c, roadColor: 0x2e2e2e,
    buildingColors: [0x4a3728, 0x5c4a3a, 0x3d3020, 0x6b5544],
    accentColor: 0xc0392b, dificultad: 4, velocidadScroll: 300,
    descripcion: 'Industrial gris + cumbia'
  },
  {
    key: 'rosario', nombre: 'Rosario',
    bgColor: 0x1a3a5c, roadColor: 0x234f7a,
    buildingColors: [0x5c7a8c, 0x4a6b7c, 0x6b8c9e, 0x3d5c6b],
    accentColor: 0xe74c3c, dificultad: 5, velocidadScroll: 320,
    descripcion: 'Río + industrial + orgullo', vientoLateral: true
  },
  {
    key: 'mardel', nombre: 'Mar del Plata',
    bgColor: 0x006994, roadColor: 0x0077aa,
    buildingColors: [0xf4d03f, 0xe8c547, 0xf0e68c, 0xdaa520],
    accentColor: 0xff6b6b, dificultad: 6, velocidadScroll: 340,
    descripcion: 'Verano caótico', arenaFriction: true
  },
  {
    key: 'microcentro', nombre: 'Microcentro',
    bgColor: 0x0a0a0a, roadColor: 0x1a1a1a,
    buildingColors: [0x2c2c2c, 0x3a3a3a, 0x1e1e1e, 0x444444],
    accentColor: 0xf39c12, dificultad: 7, velocidadScroll: 380,
    descripcion: 'Caos total porteño', esFinal: true
  }
];

const ENEMY_TYPES = {
  BICICLETA: { vel: 100, vida: 1, puntos: 50,  w: 24, h: 40, color: 0x27ae60, textura: 'bicicleta' },
  COLECTIVO: { vel: 60,  vida: 5, puntos: 200, w: 44, h: 80, color: 0xf39c12, textura: 'colectivo' },
  TRANSITO:  { vel: 140, vida: 3, puntos: 150, w: 32, h: 52, color: 0x2980b9, textura: 'transito'  },
  DELIVERY:  { vel: 200, vida: 2, puntos: 100, w: 26, h: 44, color: 0xe74c3c, textura: 'delivery_rival' },
  OBRA:      { vel: 0,   vida: 8, puntos: 300, w: 60, h: 40, color: 0xe67e22, textura: 'obra'      },
  PERRO:     { vel: 160, vida: 1, puntos: 75,  w: 20, h: 20, color: 0x8e5a2b, textura: 'perro'     },
};

const UPGRADES = [
  { key: 'mochila',     nombre: 'Mochila térmica XL',   costo: 50,  descripcion: '+2 disparos por carga' },
  { key: 'motor',       nombre: 'Motor tuneado',         costo: 80,  descripcion: 'Velocidad +20%' },
  { key: 'bocina',      nombre: 'Bocina Boca Juniors',   costo: 120, descripcion: 'Área bocina x2' },
  { key: 'casco',       nombre: 'Casco con visera',      costo: 100, descripcion: '+1 golpe de vida' },
  { key: 'gps',         nombre: 'GPS que funciona',      costo: 150, descripcion: 'Aviso anticipado' },
  { key: 'energizante', nombre: 'Bebida energizante',    costo: 60,  descripcion: 'Power-up x3 temporal' },
];

// ============================================================
//  BOOT SCENE — genera texturas procedurales
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  create() {
    this._generarTexturas();
    this.scene.start('MenuScene');
  }

  _generarTexturas() {
    const g = this.make.graphics({ add: false });

    // Moto de Maxi (top-down)
    g.clear();
    g.fillStyle(0xffffff); g.fillRoundedRect(0, 0, 28, 48, 6);
    g.fillStyle(0x333333); g.fillRect(4, 8, 20, 6); g.fillRect(4, 34, 20, 6);
    g.fillStyle(0xe74c3c); g.fillRect(8, 14, 12, 16);
    g.fillStyle(0xf39c12); g.fillCircle(14, 44, 4); g.fillCircle(14, 4, 4);
    g.generateTexture('moto', 28, 48);

    // Bala (empanada)
    g.clear();
    g.fillStyle(0xc8860a); g.fillEllipse(7, 4, 14, 8);
    g.fillStyle(0xe8a020); g.fillEllipse(9, 3, 8, 5);
    g.generateTexture('bala', 14, 8);

    // Bicicleta hipster
    g.clear();
    g.fillStyle(0x27ae60); g.fillRect(0, 0, 24, 40);
    g.fillStyle(0x1e8449); g.fillRect(4, 4, 16, 8);
    g.fillStyle(0xffffff); g.fillRect(4, 16, 16, 4);
    g.generateTexture('bicicleta', 24, 40);

    // Colectivo
    g.clear();
    g.fillStyle(0xf39c12); g.fillRoundedRect(0, 0, 44, 80, 4);
    g.fillStyle(0xf0f0f0); g.fillRect(4, 8, 36, 20);
    g.fillStyle(0x333333); g.fillRect(4, 68, 14, 8); g.fillRect(26, 68, 14, 8);
    g.fillStyle(0xe67e22); g.fillRect(0, 36, 44, 4);
    g.generateTexture('colectivo', 44, 80);

    // Tránsito municipal
    g.clear();
    g.fillStyle(0x2980b9); g.fillRoundedRect(0, 0, 32, 52, 4);
    g.fillStyle(0xffffff); g.fillRect(4, 10, 24, 14);
    g.fillStyle(0xe74c3c); g.fillRect(8, 2, 16, 6);
    g.generateTexture('transito', 32, 52);

    // Delivery rival
    g.clear();
    g.fillStyle(0xe74c3c); g.fillRoundedRect(0, 0, 26, 44, 5);
    g.fillStyle(0xc0392b); g.fillRect(6, 12, 14, 14);
    g.fillStyle(0xffffff); g.fillRect(8, 14, 10, 2);
    g.generateTexture('delivery_rival', 26, 44);

    // Obra pública
    g.clear();
    g.fillStyle(0xe67e22); g.fillRect(0, 0, 60, 40);
    g.fillStyle(0xf39c12);
    for (let i = 0; i < 4; i++) g.fillRect(i * 16, 0, 8, 40);
    g.fillStyle(0xe74c3c); g.fillRect(0, 16, 60, 8);
    g.generateTexture('obra', 60, 40);

    // Perro suelto
    g.clear();
    g.fillStyle(0x8e5a2b); g.fillEllipse(10, 10, 20, 14);
    g.fillStyle(0x7d4e24); g.fillCircle(18, 4, 6);
    g.generateTexture('perro', 24, 20);

    // Estrella / propina
    g.clear();
    g.fillStyle(0xf1c40f); g.fillStar(8, 8, 5, 8, 4);
    g.generateTexture('estrella', 16, 16);

    // Explosión
    g.clear();
    g.fillStyle(0xff6b00); g.fillCircle(16, 16, 16);
    g.fillStyle(0xffff00); g.fillCircle(16, 16, 10);
    g.fillStyle(0xffffff); g.fillCircle(16, 16, 4);
    g.generateTexture('explosion', 32, 32);

    // Fondo de calle
    g.clear();
    g.fillStyle(0x2c2c2c); g.fillRect(0, 0, GAME_W, GAME_H);
    g.fillStyle(0x3d3d3d); g.fillRect(60, 0, GAME_W - 120, GAME_H);
    g.fillStyle(0x555555); g.fillRect(58, 0, 2, GAME_H); g.fillRect(GAME_W - 60, 0, 2, GAME_H);
    g.fillStyle(0xf1c40f);
    for (let y = 0; y < GAME_H; y += 60) g.fillRect(GAME_W / 2 - 2, y, 4, 36);
    g.generateTexture('fondo_calle', GAME_W, GAME_H);

    // Onda bocina
    g.clear();
    g.lineStyle(3, 0xffe66d, 1);   g.strokeCircle(40, 40, 38);
    g.lineStyle(2, 0xffe66d, 0.5); g.strokeCircle(40, 40, 24);
    g.generateTexture('bocina_wave', 80, 80);

    g.destroy();
  }
}

// ============================================================
//  MENU SCENE
// ============================================================
class MenuScene extends Phaser.Scene {
  constructor() { super('MenuScene'); }

  create() {
    const cx = GAME_W / 2;
    this.bg = this.add.tileSprite(0, 0, GAME_W, GAME_H, 'fondo_calle').setOrigin(0);

    this.add.text(cx, 160, '¡Pedilo Ya!', {
      fontSize: '54px', fontFamily: 'Arial Black, sans-serif',
      color: '#f39c12', stroke: '#000000', strokeThickness: 8, align: 'center'
    }).setOrigin(0.5);

    this.add.text(cx, 234, 'El delivery más rápido del país.\nO lo que queda de él.', {
      fontSize: '16px', fontFamily: 'Arial, sans-serif',
      color: '#ecf0f1', align: 'center', lineSpacing: 6
    }).setOrigin(0.5);

    const moto = this.add.image(cx, 400, 'moto').setScale(3);
    this.tweens.add({ targets: moto, y: 388, duration: 900, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 });

    const btnBg = this.add.rectangle(cx, 560, 230, 62, 0xf39c12).setInteractive({ useHandCursor: true });
    this.add.text(cx, 560, 'JUGAR', { fontSize: '30px', fontFamily: 'Arial Black', color: '#000' }).setOrigin(0.5);
    btnBg.on('pointerdown', () => {
      this.cameras.main.fadeOut(300, 0, 0, 0);
      this.time.delayedCall(300, () => {
        this.scene.start('GameScene', { barrioIndex: 0 });
        this.scene.launch('UIScene');
      });
    });
    btnBg.on('pointerover', () => btnBg.setFillStyle(0xe67e22));
    btnBg.on('pointerout',  () => btnBg.setFillStyle(0xf39c12));

    this.add.text(cx, 660, 'Palermo · Flores · La Boca · Conurbano\nRosario · Mar del Plata · Microcentro', {
      fontSize: '12px', fontFamily: 'Arial, sans-serif',
      color: '#7f8c8d', align: 'center', lineSpacing: 5
    }).setOrigin(0.5);

    this.cameras.main.fadeIn(400);
  }

  update() { this.bg.tilePositionY -= 1.5; }
}

// ============================================================
//  GAME SCENE
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.barrioIndex   = data.barrioIndex || 0;
    this.barrio        = BARRIOS[this.barrioIndex];
    this.vida          = 3;
    this.estrellas     = 0;
    this.municion      = 6;
    this.municionMax   = 6;
    this.score         = 0;
    this.bocinaCharge  = 0;
    this.bocinaCooldown = false;
    this.invencible    = false;
    this.recargando    = false;
    this.vientoX       = 0;
    this.tiempoRestante = 90 - this.barrioIndex * 5;
    this.touchTarget   = null;
    this.bocinaPresionada = false;
  }

  create() {
    const b = this.barrio;

    // Fondo
    this.bg = this.add.tileSprite(0, 0, GAME_W, GAME_H, 'fondo_calle').setOrigin(0).setTint(b.bgColor);

    // Grupos
    this.balas    = this.physics.add.group({ maxSize: 40, runChildUpdate: true });
    this.enemigos = this.physics.add.group({ runChildUpdate: true });
    this.items    = this.physics.add.group();

    // Jugador
    this.jugador = this.physics.add.image(GAME_W / 2, GAME_H - 120, 'moto');
    this.jugador.setCollideWorldBounds(true).setDepth(10);

    // Touch
    this.input.on('pointermove', p => { if (p.isDown && p.y < GAME_H - 150) this.touchTarget = { x: p.x, y: p.y }; });
    this.input.on('pointerdown', p => { if (p.y < GAME_H - 150) this.touchTarget = { x: p.x, y: p.y }; });
    this.input.on('pointerup',   () => { this.touchTarget = null; });

    // Colisiones
    this.physics.add.overlap(this.balas,    this.enemigos, this._balaVsEnemigo,    null, this);
    this.physics.add.overlap(this.jugador,  this.enemigos, this._jugadorVsEnemigo, null, this);
    this.physics.add.overlap(this.jugador,  this.items,    this._recogerItem,      null, this);

    // Timers
    this.time.addEvent({ delay: 1800 - this.barrioIndex * 120, callback: this._spawnEnemigo, callbackScope: this, loop: true });
    this.time.addEvent({ delay: 380,  callback: this._autoDisparar, callbackScope: this, loop: true });
    this.time.addEvent({ delay: 1000, callback: this._tickTiempo,   callbackScope: this, loop: true });
    this.time.addEvent({ delay: 22000, callback: this._eventoLluvia, callbackScope: this, loop: true });

    // Viento Rosario
    if (b.vientoLateral) {
      this.vientoX = Phaser.Math.Between(-45, 45);
      this.time.addEvent({ delay: 3500, callback: () => { this.vientoX = Phaser.Math.Between(-55, 55); }, loop: true });
      this._mostrarMensaje('¡Viento del Paraná!', '#88ccff');
    }
    if (b.arenaFriction) this._mostrarMensaje('¡Arena por todos lados!', '#f4d03f');
    if (b.esFinal)       this._mostrarMensaje('¡MICROCENTRO!\n¡El caos total!', '#e74c3c');

    // Botón bocina
    this._crearBotonBocina();

    // Notificar UI
    this.events.emit('updateUI', this._estado());
    this.cameras.main.fadeIn(400);
  }

  update(time, delta) {
    const dt = delta / 1000;
    this.bg.tilePositionY -= this.barrio.velocidadScroll * dt;

    // Mover jugador hacia touch
    if (this.touchTarget) {
      const dx = this.touchTarget.x - this.jugador.x;
      const dy = this.touchTarget.y - this.jugador.y;
      const dist = Math.hypot(dx, dy);
      const spd  = this.barrio.arenaFriction ? 220 : 330;
      if (dist > 8) this.jugador.setVelocity((dx / dist) * spd, (dy / dist) * spd);
      else          this.jugador.setVelocity(0, 0);
    } else {
      this.jugador.setVelocity(0, 0);
    }

    // Viento lateral
    if (this.barrio.vientoLateral) {
      this.jugador.x = Phaser.Math.Clamp(this.jugador.x + this.vientoX * dt, 20, GAME_W - 20);
    }

    // Cargar bocina
    if (this.bocinaPresionada && !this.bocinaCooldown) {
      this.bocinaCharge = Math.min(100, this.bocinaCharge + 70 * dt);
      this.events.emit('updateBocina', this.bocinaCharge);
    }

    // Limpiar fuera de pantalla
    this.balas.getChildren().forEach(b => { if (b.active && b.y < -20) b.destroy(); });
    this.enemigos.getChildren().forEach(e => { if (e.active && e.y > GAME_H + 80) e.destroy(); });
  }

  _crearBotonBocina() {
    const bx = GAME_W / 2, by = GAME_H - 68;
    const btn = this.add.circle(bx, by, 40, 0xf39c12, 0.88).setInteractive().setDepth(20);
    this.add.text(bx, by, 'BOCINA', { fontSize: '12px', fontFamily: 'Arial Black', color: '#000' }).setOrigin(0.5).setDepth(21);
    btn.on('pointerdown', () => { this.bocinaPresionada = true; });
    btn.on('pointerup',   () => this._soltarBocina());
    btn.on('pointerout',  () => this._soltarBocina());
  }

  _soltarBocina() {
    if (!this.bocinaPresionada) return;
    this.bocinaPresionada = false;
    if (this.bocinaCharge >= 25 && !this.bocinaCooldown) this._activarBocina(this.bocinaCharge);
    this.bocinaCharge = 0;
    this.events.emit('updateBocina', 0);
  }

  _activarBocina(potencia) {
    this.bocinaCooldown = true;
    const radio = 90 + potencia * 0.8;
    const onda  = this.add.image(this.jugador.x, this.jugador.y, 'bocina_wave').setScale(0.5).setDepth(15).setAlpha(0.9);
    this.tweens.add({
      targets: onda, scaleX: (radio * 2) / 80, scaleY: (radio * 2) / 80,
      alpha: 0, duration: 420, onComplete: () => onda.destroy()
    });
    this.enemigos.getChildren().forEach(e => {
      if (!e.active) return;
      const dist = Phaser.Math.Distance.Between(this.jugador.x, this.jugador.y, e.x, e.y);
      if (dist < radio) {
        const ang = Phaser.Math.Angle.Between(this.jugador.x, this.jugador.y, e.x, e.y);
        e.setVelocity(Math.cos(ang) * 420, Math.sin(ang) * 420);
        this.time.delayedCall(700, () => { if (e.active) e.setVelocity(0, 90); });
      }
    });
    this.cameras.main.shake(120, 0.008);
    this.time.delayedCall(2800, () => { this.bocinaCooldown = false; });
  }

  _autoDisparar() {
    if (!this.jugador.active || this.municion <= 0 || this.recargando) return;
    const bala = this.balas.create(this.jugador.x, this.jugador.y - 32, 'bala');
    if (!bala) return;
    bala.setVelocityY(-540).setDepth(8);
    this.municion--;
    this.events.emit('updateUI', this._estado());
    if (this.municion <= 0) {
      this.recargando = true;
      this.time.delayedCall(1600, () => {
        this.municion  = this.municionMax;
        this.recargando = false;
        this.events.emit('updateUI', this._estado());
      });
    }
  }

  _spawnEnemigo() {
    const tipos   = Object.keys(ENEMY_TYPES);
    const maxTipo = Math.min(2 + this.barrioIndex, tipos.length);
    const tipo    = Phaser.Utils.Array.GetRandom(tipos.slice(0, maxTipo));
    const cfg     = ENEMY_TYPES[tipo];
    const x       = Phaser.Math.Between(cfg.w / 2 + 30, GAME_W - cfg.w / 2 - 30);
    const e       = this.enemigos.create(x, -cfg.h - 10, cfg.textura);
    if (!e) return;
    e.setDepth(9);
    e.vida   = cfg.vida;
    e.tipo   = tipo;
    e.puntos = cfg.puntos;
    const vel = cfg.vel + this.barrioIndex * 18 + Phaser.Math.Between(-15, 15);
    e.setVelocityY(vel);
    if (tipo === 'COLECTIVO') {
      this.tweens.add({ targets: e, x: x + Phaser.Math.Between(-70, 70), duration: 1400, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 });
    }
    if (tipo === 'DELIVERY') e.setVelocityX(Phaser.Math.Between(-100, 100));
    if (tipo === 'PERRO')    e.setVelocityX(Phaser.Math.Between(-140, 140));
  }

  _balaVsEnemigo(bala, enemigo) {
    bala.destroy();
    enemigo.vida--;
    this.tweens.add({ targets: enemigo, alpha: 0.25, duration: 70, yoyo: true });
    if (enemigo.vida <= 0) this._destruirEnemigo(enemigo);
  }

  _destruirEnemigo(enemigo) {
    const { x, y, puntos } = enemigo;
    this.score += puntos;
    const exp = this.add.image(x, y, 'explosion').setDepth(12);
    this.tweens.add({ targets: exp, scale: 2.2, alpha: 0, duration: 320, onComplete: () => exp.destroy() });
    if (Math.random() < 0.72) {
      const it = this.items.create(x, y, 'estrella').setDepth(7).setVelocityY(55);
      it.tipo = 'estrella';
      this.time.delayedCall(4500, () => { if (it.active) it.destroy(); });
    }
    enemigo.destroy();
    this.events.emit('updateUI', this._estado());
  }

  _jugadorVsEnemigo(jugador, enemigo) {
    if (this.invencible) return;
    this.vida--;
    enemigo.destroy();
    this.invencible = true;
    this.tweens.add({ targets: jugador, alpha: 0.3, duration: 110, yoyo: true, repeat: 7, onComplete: () => { jugador.setAlpha(1); this.invencible = false; } });
    this.cameras.main.shake(180, 0.016);
    this.events.emit('updateUI', this._estado());
    if (this.vida <= 0) this._gameOver();
  }

  _recogerItem(jugador, item) {
    if (!item.active) return;
    this.estrellas++;
    this.events.emit('updateUI', this._estado());
    const txt = this.add.text(item.x, item.y - 10, '+★', { fontSize: '18px', fontFamily: 'Arial Black', color: '#f1c40f', stroke: '#000', strokeThickness: 4 }).setDepth(15);
    this.tweens.add({ targets: txt, y: item.y - 55, alpha: 0, duration: 650, onComplete: () => txt.destroy() });
    item.destroy();
  }

  _eventoLluvia() {
    const overlay = this.add.rectangle(0, 0, GAME_W, GAME_H, 0x001133, 0.45).setOrigin(0).setDepth(25);
    this._mostrarMensaje('¡Lluvia porteña!\nTodo el mundo pide delivery', '#88ccff', 26);
    for (let i = 0; i < 5; i++) this.time.delayedCall(i * 350, this._spawnEnemigo, [], this);
    this.time.delayedCall(4500, () => overlay.destroy());
  }

  _mostrarMensaje(txt, color, depth = 30) {
    const t = this.add.text(GAME_W / 2, GAME_H / 2 - 80, txt, {
      fontSize: '20px', fontFamily: 'Arial Black', color,
      stroke: '#000', strokeThickness: 5, align: 'center'
    }).setOrigin(0.5).setDepth(depth);
    this.tweens.add({ targets: t, alpha: 0, delay: 2200, duration: 600, onComplete: () => t.destroy() });
  }

  _tickTiempo() {
    if (this.tiempoRestante > 0) {
      this.tiempoRestante--;
      this.events.emit('updateUI', this._estado());
      if (this.tiempoRestante === 0) this._mostrarMensaje('¡Llegaste tarde!\n-50% propina', '#e74c3c');
    }
  }

  _gameOver() {
    this.physics.pause();
    this.time.removeAllEvents();
    this.cameras.main.fadeOut(500, 0, 0, 0);
    this.time.delayedCall(520, () => {
      this.scene.stop('UIScene');
      this.scene.start('GameOverScene', {
        score: this.score, estrellas: this.estrellas,
        barrioIndex: this.barrioIndex, barrio: this.barrio.nombre,
        tiempoRestante: this.tiempoRestante
      });
    });
  }

  _estado() {
    return { vida: this.vida, estrellas: this.estrellas, municion: this.municion,
             municionMax: this.municionMax, score: this.score, tiempo: this.tiempoRestante,
             barrio: this.barrio.nombre, recargando: this.recargando };
  }
}

// ============================================================
//  UI SCENE — HUD superpuesto
// ============================================================
class UIScene extends Phaser.Scene {
  constructor() { super('UIScene'); }

  create() {
    // Fondo HUD
    this.add.rectangle(0, 0, GAME_W, 70, 0x000000, 0.6).setOrigin(0);

    // Barrio
    this.txtBarrio = this.add.text(GAME_W / 2, 8, '', {
      fontSize: '13px', fontFamily: 'Arial Black', color: '#f39c12',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5, 0);

    // Corazones
    this.corazones = [];
    for (let i = 0; i < 3; i++) {
      this.corazones.push(this.add.text(14 + i * 26, 28, '♥', { fontSize: '22px', color: '#e74c3c' }));
    }

    // Estrellas
    this.txtEstrellas = this.add.text(14, 52, '★ 0', {
      fontSize: '14px', fontFamily: 'Arial Black', color: '#f1c40f',
      stroke: '#000', strokeThickness: 3
    });

    // Score
    this.txtScore = this.add.text(GAME_W / 2, 50, '0', {
      fontSize: '14px', fontFamily: 'Arial Black', color: '#ecf0f1',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5, 0);

    // Tiempo
    this.txtTiempo = this.add.text(GAME_W - 14, 26, '90s', {
      fontSize: '22px', fontFamily: 'Arial Black', color: '#2ecc71',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(1, 0);

    // Munición
    this.iconosMun = [];
    for (let i = 0; i < 6; i++) {
      this.iconosMun.push(
        this.add.text(GAME_W - 14 - i * 19, 52, '●', { fontSize: '13px', color: '#c8860a' }).setOrigin(1, 0)
      );
    }

    // Barra bocina
    this.add.rectangle(GAME_W / 2, GAME_H - 118, 108, 9, 0x222222, 0.85).setOrigin(0.5);
    this.bocinaFill = this.add.rectangle(GAME_W / 2 - 54, GAME_H - 118, 0, 9, 0xf39c12).setOrigin(0, 0.5);
    this.add.text(GAME_W / 2, GAME_H - 130, 'carga bocina', {
      fontSize: '10px', fontFamily: 'Arial', color: '#888'
    }).setOrigin(0.5);

    const gs = this.scene.get('GameScene');
    gs.events.on('updateUI',    this._refresh,       this);
    gs.events.on('updateBocina', this._refreshBocina, this);
  }

  _refresh(e) {
    if (!e) return;
    this.txtBarrio.setText(e.barrio.toUpperCase());
    this.corazones.forEach((c, i) => c.setColor(i < e.vida ? '#e74c3c' : '#333333'));
    this.txtEstrellas.setText('★ ' + e.estrellas);
    this.txtScore.setText(e.score.toLocaleString());
    const t = Math.max(0, e.tiempo);
    this.txtTiempo.setText(t + 's').setColor(t > 20 ? '#2ecc71' : t > 10 ? '#f39c12' : '#e74c3c');
    this.iconosMun.forEach((m, i) => m.setColor(i < e.municion ? (e.recargando ? '#888' : '#c8860a') : '#2a2a2a'));
  }

  _refreshBocina(charge) {
    this.bocinaFill.width = Math.round(charge * 1.08);
    this.bocinaFill.setFillStyle(charge < 30 ? 0x666666 : charge < 70 ? 0xf39c12 : 0xe74c3c);
  }
}

// ============================================================
//  GAME OVER SCENE
// ============================================================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }

  init(data) { this.result = data; }

  create() {
    const d = this.result, cx = GAME_W / 2;

    this.add.rectangle(0, 0, GAME_W, GAME_H, 0x000000, 0.88).setOrigin(0);

    this.add.text(cx, 90, '¡Pedido entregado!', {
      fontSize: '28px', fontFamily: 'Arial Black', color: '#f39c12',
      stroke: '#000', strokeThickness: 6, align: 'center'
    }).setOrigin(0.5);

    this.add.text(cx, 134, d.barrio, {
      fontSize: '15px', fontFamily: 'Arial', color: '#7f8c8d'
    }).setOrigin(0.5);

    const rating = this._rating(d);
    this.add.text(cx, 196, '★'.repeat(rating) + '☆'.repeat(5 - rating), {
      fontSize: '38px', color: rating >= 3 ? '#f1c40f' : '#e74c3c'
    }).setOrigin(0.5);

    const msgs = ['¡Una vergüenza! Te bloqueó.', 'Llegó frío y aplastado.', 'Más o menos...', '¡Buen trabajo, Maxi!', '¡5 estrellas! ¡Propina doble!'];
    this.add.text(cx, 254, msgs[rating - 1], {
      fontSize: '15px', fontFamily: 'Arial', color: '#ecf0f1', align: 'center'
    }).setOrigin(0.5);

    // Stats
    [
      ['Score',             d.score.toLocaleString()],
      ['Estrellas recogidas', d.estrellas],
      ['Tiempo sobrante',   Math.max(0, d.tiempoRestante) + 's'],
    ].forEach(([lbl, val], i) => {
      const y = 316 + i * 42;
      this.add.rectangle(cx, y, 310, 34, 0x111111).setOrigin(0.5);
      this.add.text(cx - 140, y, lbl, { fontSize: '13px', fontFamily: 'Arial', color: '#7f8c8d' }).setOrigin(0, 0.5);
      this.add.text(cx + 140, y, String(val), { fontSize: '14px', fontFamily: 'Arial Black', color: '#ecf0f1' }).setOrigin(1, 0.5);
    });

    const propina = d.estrellas * 10 * rating;
    this.add.text(cx, 460, '+ $' + propina + ' de propina', {
      fontSize: '22px', fontFamily: 'Arial Black', color: '#2ecc71',
      stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);

    // Botones
    this._btn(cx - 85, 546, 'REINTENTAR', 0xe74c3c, () => {
      this.scene.start('GameScene', { barrioIndex: d.barrioIndex });
      this.scene.launch('UIScene');
    });

    if (d.barrioIndex < BARRIOS.length - 1 && rating >= 2) {
      this._btn(cx + 85, 546, 'SIG.\nBARRIO', 0x27ae60, () => {
        this.scene.start('GameScene', { barrioIndex: d.barrioIndex + 1 });
        this.scene.launch('UIScene');
      });
    }

    this._btn(cx, 628, 'MENÚ PRINCIPAL', 0x444444, () => this.scene.start('MenuScene'));

    this.cameras.main.fadeIn(400);
  }

  _rating(d) {
    let r = 5;
    if (d.tiempoRestante <= 0)   r -= 2;
    else if (d.tiempoRestante < 15) r -= 1;
    if (d.estrellas < 3) r -= 1;
    return Phaser.Math.Clamp(r, 1, 5);
  }

  _btn(x, y, label, color, cb) {
    const btn = this.add.rectangle(x, y, 150, 52, color).setInteractive({ useHandCursor: true });
    this.add.text(x, y, label, { fontSize: '13px', fontFamily: 'Arial Black', color: '#fff', align: 'center', lineSpacing: 2 }).setOrigin(0.5);
    btn.on('pointerdown', cb);
    btn.on('pointerover', () => btn.setAlpha(0.75));
    btn.on('pointerout',  () => btn.setAlpha(1));
  }
}

// ============================================================
//  MAIN — inicializar Phaser
// ============================================================
new Phaser.Game({
  type: Phaser.AUTO,
  width: GAME_W,
  height: GAME_H,
  backgroundColor: '#1a1a2e',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    parent: document.body,
  },
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scene: [BootScene, MenuScene, GameScene, UIScene, GameOverScene]
});
</script>
